name: ci

on:
  push:
    branches:
      - main
      - v0.0.x
      - v0.1.x
      - v0.2.x
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build

      - name: Verify default fetch output
        run: |
          cargo run --bin corefetch | grep -F "Shell:"
          cargo run --bin corefetch | grep -F "Terminal:"

      - name: Verify minimal output
        run: |
          cargo run --bin corefetch -- --minimal | grep -F " | "

      - name: Verify JSON output
        run: |
          cargo run --bin corefetch -- --json | python3 -c 'import json, sys; data = json.load(sys.stdin); assert data["contracts"][0]["contract_version"] == "foundation-v1"; assert data["contracts"][1]["contract_version"] == "baseline-v1"; assert data["contracts"][2]["contract_version"] == "environment-v1"; assert any(module["key"] == "shell" for module in data["modules"]); assert any(module["key"] == "terminal" for module in data["modules"])'

      - name: Verify configured minimal output
        run: |
          ORIGINAL_HOME="$HOME"
          TEMP_HOME="$(mktemp -d)"
          export HOME="$TEMP_HOME"
          export CARGO_HOME="${CARGO_HOME:-$ORIGINAL_HOME/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-$ORIGINAL_HOME/.rustup}"
          mkdir -p "$HOME/.config/corefetch"
          cp tests/fixtures/config/basic.toml "$HOME/.config/corefetch/config.toml"
          output="$(cargo run --bin corefetch)"
          echo "$output" | grep -F "Shell "
          echo "$output" | grep -F " | "
          ! echo "$output" | grep -F "Terminal "
          rm -rf "$TEMP_HOME"

      - name: Verify invalid config failure
        run: |
          ORIGINAL_HOME="$HOME"
          TEMP_HOME="$(mktemp -d)"
          export HOME="$TEMP_HOME"
          export CARGO_HOME="${CARGO_HOME:-$ORIGINAL_HOME/.cargo}"
          export RUSTUP_HOME="${RUSTUP_HOME:-$ORIGINAL_HOME/.rustup}"
          mkdir -p "$HOME/.config/corefetch"
          cp tests/fixtures/config/invalid-mode.toml "$HOME/.config/corefetch/config.toml"
          stdout_file="$(mktemp)"
          stderr_file="$(mktemp)"
          if cargo run --bin corefetch >"$stdout_file" 2>"$stderr_file"; then
            echo "expected invalid config startup to fail" >&2
            exit 1
          fi
          grep -F "corefetch: invalid output.default_mode" "$stderr_file"
          rm -f "$stdout_file" "$stderr_file"
          rm -rf "$TEMP_HOME"