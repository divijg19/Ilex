name: ci

on:
  push:
    branches:
      - main
      - v0.0.x
      - v0.1.x
      - v0.2.x
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build

      - name: Verify default fetch output
        run: |
          cargo run --bin corefetch | grep -F "Disk:"

      - name: Verify minimal output
        run: |
          cargo run --bin corefetch -- --minimal | grep -F " | "

      - name: Verify JSON output
        run: |
          cargo run --bin corefetch -- --json | python3 -c 'import json, sys; data = json.load(sys.stdin); assert data["contracts"][0]["contract_version"] == "foundation-v1"; assert data["contracts"][1]["contract_version"] == "baseline-v1"; assert any(module["key"] == "disk" for module in data["modules"])'